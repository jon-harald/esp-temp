name: EspTemp

options:
  bundleIdPrefix: no.brathen.esptemp
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: E5M8T2CHME   # Jon-Harald Brathen (Personal Team)

targets:

  # ---------- iOS app ----------
  EspTemp:
    type: application
    platform: iOS
    sources:
      - Sources/Shared
      - Sources/App
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: no.brathen.esptemp
        CODE_SIGN_ENTITLEMENTS: Supporting/EspTemp.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: Supporting/App-Info.plist
      properties:
        CFBundleDisplayName: Temp
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    dependencies:
      - target: EspTempWatch

  # ---------- watchOS app ----------
  EspTempWatch:
    type: application
    platform: watchOS
    sources:
      - Sources/Shared
      - Sources/Watch
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: no.brathen.esptemp.watchkitapp
        CODE_SIGN_ENTITLEMENTS: Supporting/EspTempWatch.entitlements
    info:
      path: Supporting/Watch-Info.plist
      properties:
        CFBundleDisplayName: Temp
        WKApplication: true
        WKCompanionAppBundleIdentifier: no.brathen.esptemp
    dependencies:
      - target: EspTempComplication

  # ---------- watchOS complication (WidgetKit extension) ----------
  EspTempComplication:
    type: app-extension
    platform: watchOS
    sources:
      - Sources/Shared
      - Sources/Complication
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: no.brathen.esptemp.watchkitapp.complication
        CODE_SIGN_ENTITLEMENTS: Supporting/EspTempComplication.entitlements
    info:
      path: Supporting/Complication-Info.plist
      properties:
        CFBundleDisplayName: Temp
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
