name: EspTemp

options:
  bundleIdPrefix: no.brathen.esptemp
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

# Firebase (Auth + Firestore + Cloud Messaging) — iOS app target ONLY.
# NEVER add these to the watch/complication targets, and NEVER `import Firebase*`
# from Sources/Shared (which compiles into all three targets).
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "12.0.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: E5M8T2CHME   # Jon-Harald Brathen (paid Apple Developer account)

targets:

  # ---------- iOS app ----------
  EspTemp:
    type: application
    platform: iOS
    sources:
      - Sources/Shared
      - Sources/App
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: no.brathen.esptemp
        CODE_SIGN_ENTITLEMENTS: Supporting/EspTemp.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Supporting/App-Info.plist
      properties:
        CFBundleDisplayName: Temp
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification
    dependencies:
      - target: EspTempWatch
      - target: EspTempWidget
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseMessaging

  # ---------- iOS widget (WidgetKit extension: home screen + Lock Screen) ----------
  EspTempWidget:
    type: app-extension
    platform: iOS
    sources:
      - Sources/Shared
      - Sources/Widget
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: no.brathen.esptemp.widget
        CODE_SIGN_ENTITLEMENTS: Supporting/EspTempWidget.entitlements
    info:
      path: Supporting/Widget-Info.plist
      properties:
        CFBundleDisplayName: Temp
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  # ---------- watchOS app ----------
  EspTempWatch:
    type: application
    platform: watchOS
    sources:
      - Sources/Shared
      - Sources/Watch
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: no.brathen.esptemp.watchkitapp
        CODE_SIGN_ENTITLEMENTS: Supporting/EspTempWatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Supporting/Watch-Info.plist
      properties:
        CFBundleDisplayName: Temp
        WKApplication: true
        WKCompanionAppBundleIdentifier: no.brathen.esptemp
    dependencies:
      - target: EspTempComplication

  # ---------- watchOS complication (WidgetKit extension) ----------
  EspTempComplication:
    type: app-extension
    platform: watchOS
    sources:
      - Sources/Shared
      - Sources/Complication
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: no.brathen.esptemp.watchkitapp.tempwidget
        CODE_SIGN_ENTITLEMENTS: Supporting/EspTempComplication.entitlements
    info:
      path: Supporting/Complication-Info.plist
      properties:
        CFBundleDisplayName: Temp
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
